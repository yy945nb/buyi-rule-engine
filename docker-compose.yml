version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: buyi-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: rule_engine_open
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./buyi-rule-engine-web/src/main/resources/sql/rule-engine-open.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: buyi-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: buyi-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

  rule-engine-web:
    build:
      context: .
      dockerfile: buyi-rule-engine-web/Dockerfile
    container_name: buyi-rule-engine-web
    ports:
      - "20888:20888"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      APPLICATION_PORT: "20888"
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: rule_engine_open
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RULE_ENGINE_ADMIN_USERNAME: ${RULE_ENGINE_ADMIN_USERNAME:-admin}
      RULE_ENGINE_ADMIN_PASSWORD: ${RULE_ENGINE_ADMIN_PASSWORD:-admin@123}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  rule-engine-compute:
    build:
      context: .
      dockerfile: buyi-rule-engine-compute/Dockerfile
    container_name: buyi-rule-engine-compute
    ports:
      - "8011:8011"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_DATABASE: rule_engine_open
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  gateway-app:
    build:
      context: .
      dockerfile: buyi-gateway-app/Dockerfile
    container_name: buyi-gateway-app
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      MYSQL_HOST: mysql
      MYSQL_PORT: "3306"
      MYSQL_USERNAME: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  mysql_data:
  redis_data:
