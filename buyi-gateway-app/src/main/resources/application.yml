# ============================================================
# 本地开发环境配置说明
# 1. 复制 application-local.example.yml 为 application-local.yml
# 2. 修改其中的数据库/Redis/加密密钥等配置
# 3. application-local.yml 已加入 .gitignore，不会提交到 Git
# ============================================================
spring:
  application:
    name: AI-Gateway
  profiles:
    active: local

  # WebFlux 请求体缓冲区限制（默认 256KB，AI 模型请求体较大需调高）
  # 多模态请求（含 base64 图片/文件）可达数十 MB，100MB 确保不因缓冲区溢出丢失请求
  codec:
    max-in-memory-size: 100MB

  # 优雅停机：等待在途请求完成
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # MySQL 数据源（管理接口 + Flyway 使用）
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:ai_gateway}?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}
    password: ${DB_PASS:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 300000
      max-lifetime: 1800000

  # Flyway 数据库迁移
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    encoding: UTF-8

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      database: 0
      timeout: 5000ms

# API Key 加密密钥（32 字节 hex 编码，64 个十六进制字符）
gateway:
  security:
    api-key-secret: ${GATEWAY_API_KEY_SECRET:}

  auth:
    enabled: true # API Key 认证开关，true 时对 /v1/** 路径强制校验

  # 管理后台认证（管理员账号改为数据库存储）
  admin-auth:
    session-ttl-days: 7               # 管理后台登录会话有效期（天）
    csrf-signing-key: ${GATEWAY_ADMIN_CSRF_SIGNING_KEY:}  # CSRF Token 签名密钥（Base64 编码 32 字节），为空时随机生成
    csrf-cookie-same-site: "Lax"        # CSRF Cookie SameSite（Lax/Strict/None），反向代理场景需改为 None 并启用 HTTPS
    trust-forwarded-headers: false       # 是否信任 X-Forwarded-* 头；仅在可信反向代理会清洗外部同名头时开启
    trusted-origins:                   # CSRF Origin 校验可信来源（开发环境前端与后端端口不同时需配置）
      - "http://localhost:5173"        # Vite 开发服务器默认地址


  # 全局重试配置（流式和非流式统一）
  # 流式请求仅在首个 token 到达前重试，避免数据重复
  retry:
    max-retries: 3 # 最大重试次数（不含首次请求）
    initial-interval-ms: 1000 # 初始退避间隔
    max-interval-ms: 30000 # 最大退避间隔

  # CORS 跨域配置
  cors:
    enabled: true
    allowed-origins: "*"
    allowed-methods: "GET,POST,PUT,DELETE,OPTIONS"
    allowed-headers: "*"
    allow-credentials: false
    max-age-seconds: 3600

  # 限流配置
  rate-limit:
    enabled: true
    default-rpm: 60
    default-hourly-rpm: 3600

  # 熔断器配置
  circuit-breaker:
    enabled: true
    sliding-window-size: 20
    failure-rate-threshold: 80.0
    slow-call-duration-ms: 60000
    slow-call-rate-threshold: 80.0
    wait-duration-in-open-state-ms: 60000
    permitted-number-of-calls-in-half-open-state: 5
    minimum-number-of-calls: 5

  # MCP Gateway 配置
  mcp:
    enabled: true
    proxy:
      timeout: 300s
      max-in-memory-size: 262144    # 256KB
      connect-timeout: 5s
      read-timeout: 30s
    auth:
      enabled: true
      auth-type: DB                 # STATIC 或 DB
      static-keys: []
      whitelist:
        - /mcp/health
        - /actuator/**
    stats:
      enabled: true
      flush-interval: 5m
    discovery:
      nacos-enabled: true
      cache-expire: 30m
      health-check-interval: 30s
    # 路由规则引擎配置
    # 注意：此处定义的规则为种子数据，启动时由 YamlRuleConfigLoader 同步到数据库（仅插入不存在的）。
    # 运行时以数据库规则为准，可通过管理后台动态增删改规则，无需重启服务。
    # DB 中的规则修改不会被此处的配置覆盖。
    routing:
      rules:
        - name: "文件生成路由"
          description: "Excel/PDF/文件生成相关工具路由到文件服务"
          priority: 100
          matchToolPattern: "create_excel,create_pdf,export_*,generate_file"
          matchKeywords: "生成,导出,报表,文件"
          matchServiceType: "ALL"
          targets:
            - serviceId: "file-service"
              weight: 100
          enabled: true
        - name: "图片处理路由"
          description: "图片处理相关工具路由到图片服务"
          priority: 90
          matchToolPattern: "process_image,compress_image,ocr_*,resize_image"
          matchKeywords: "图片,图像,压缩,裁剪"
          targets:
            - serviceId: "image-service"
              weight: 100
          enabled: true
        - name: "数据库查询路由"
          description: "数据库查询工具路由到数据查询服务"
          priority: 80
          matchToolPattern: "query_*,sql_*,db_*"
          matchKeywords: "查询,统计,数据,数据库"
          targets:
            - serviceId: "db-query-service"
              weight: 80
            - serviceId: "db-query-service-backup"
              weight: 20
          enabled: true
        - name: "传统微服务路由"
          description: "PROTOCOL_PARSE 类型服务的通用路由"
          priority: 10
          matchServiceType: "PROTOCOL_PARSE"
          targets:
            - serviceId: "*"
              weight: 100
          enabled: true

  # WebClient 连接池与传输层配置
  http-client:
    max-connections: 500
    connect-timeout-ms: 30000

# 优雅停机
server:
  shutdown: graceful

# MyBatis
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus # 暴露健康检查、应用信息和 Prometheus 指标端点
  endpoint:
    health:
      show-details: when-authorized # 认证后显示详细健康信息
      show-components: when-authorized
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0

# SpringDoc OpenAPI 文档配置
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  packages-to-scan: com.ymware.gateway
  default-flat-param-object: true
